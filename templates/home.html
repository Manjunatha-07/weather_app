<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }
        button {
            background-color: #333;
            color: white;
        }
        .box {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>🌦️ Weather App</h1>

    <form method="POST">
        <input type="text" name="city" placeholder="Enter city">
        <button type="submit">Search</button>
    </form>

    {% if weather %}
    <div class="box">
        <h2>{{ weather.city }}</h2>
        <p>🌡️ Temp: {{ weather.temp }} °C</p>
        <p>☁️ {{ weather.desc }}</p>
        <p>💧 Humidity: {{ weather.humidity }}%</p>
    </div>
    {% endif %}

</body>
</html>
